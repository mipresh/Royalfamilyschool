<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFschool Test</title>
<style>
  body { margin:0; font-family: Arial; }
  header { background:#541e1e; color:white; display:flex; justify-content:space-between; align-items:center; padding:15px; position:relative; z-index:1000;}
  .hamburger { display:none; flex-direction:column; cursor:pointer; }
  .hamburger span { width:25px; height:3px; background:#fff; margin:4px 0; transition:0.3s; }
  nav { display:flex; gap:20px; }
  nav a { color:white; text-decoration:none; font-weight:500; }

  @media(max-width:900px){
    .hamburger { display:flex; }
    nav {
      position:fixed;
      top:60px; /* header height */
      left:0;
      width:100%;
      flex-direction:column;
      background:#541e1e;
      transform:translateY(-120%);
      opacity:0;
      pointer-events:none;
      transition:0.35s ease;
      z-index:999;
    }
    nav.active { transform:translateY(0); opacity:1; pointer-events:auto; }
    nav a { padding:15px 0; text-align:center; }
    .hamburger.active span:nth-child(1){ transform: rotate(45deg) translate(5px,5px);}
    .hamburger.active span:nth-child(2){ opacity:0; }
    .hamburger.active span:nth-child(3){ transform: rotate(-45deg) translate(7px,-6px);}
  }
</style>
</head>
<body>

<header>
  <div>Royal Family Schools</div>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <nav id="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Academics</a>
    <a href="#">Contact</a>
    <a href="#">Portal</a>
  </nav>
</header>

<main style="padding:20px;">
  <h1>Welcome to RFschool</h1>
  <p>Resize to mobile and click the hamburger.</p>
</main>

<script>
document.addEventListener("DOMContentLoaded", function(){
  const hamburger = document.getElementById("hamburger");
  const nav = document.getElementById("nav");
  hamburger.addEventListener("click", function(){
    hamburger.classList.toggle("active");
    nav.classList.toggle("active");
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, intial-scale=1.0"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel=stylesheet href="styles.css"/>
<title>RFschool</title>
<style>
  @media(max-width:900px){
    .hamburger { display:flex; }
    nav {
      position:fixed;
      top:60px; /* header height */
      left:0;
      width:100%;
      flex-direction:column;
      background:#541e1e;
      transform:translateY(-120%);
      opacity:0;
      pointer-events:none;
      transition:0.35s ease;
      z-index:999;
    }
    nav.active { transform:translateY(0); opacity:1; pointer-events:auto; }
    nav a { padding:15px 0; text-align:center; }
    .hamburger.active span:nth-child(1){ transform: rotate(45deg) translate(5px,5px);}
    .hamburger.active span:nth-child(2){ opacity:0; }
    .hamburger.active span:nth-child(3){ transform: rotate(-45deg) translate(7px,-6px);}
  }
</style>
<body>
  <div class="container">
  <div class="logo-container">
    <img src="royal-family.png" class="logo" alt="Royal Family Schools Logo">
    </div>
             <header>

<div>Royal Family Schools</div>

<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>

<nav class="nav" id="nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="academics.html">Academics</a>
<a href="contact.html">Contact</a>
<a href="portal.html">School Portal</a>
</nav>

</header>
    </div>
    
    
<section class="portal-section">
  <h2>School Portal</h2>
<div class="portal-grid">

  <a href="staff-login.html" class="portal-item">
    <i class="fa-solid fa-chalkboard-user"></i>
    <p>Staff Login</p>
  </a>

  <a href="student-login.html" class="portal-item">
    <i class="fa-solid fa-user-graduate"></i>
    <p>Student Login</p>
  </a>

  <a href="fees.html" class="portal-item">
    <i class="fa-solid fa-credit-card"></i>
    <p>Pay School Fees</p>
  </a>

  <a href="admission-result.html" class="portal-item">
    <i class="fa-solid fa-file-lines"></i>
    <p>Admission Result</p>
  </a>

  <a href="cbt.html" class="portal-item">
    <i class="fa-solid fa-pen-to-square"></i>
    <p>CBT Exam</p>
  </a>

  <a href="library.html" class="portal-item">
    <i class="fa-solid fa-book-open"></i>
    <p>E-Library</p>
  </a>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
  const hamburger = document.getElementById("hamburger");
  const nav = document.getElementById("nav");
  hamburger.addEventListener("click", function(){
    hamburger.classList.toggle("active");
    nav.classList.toggle("active");
  });
});
</script>
</body>
</html>
